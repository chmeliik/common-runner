name: Autogenerate files

"on":
  pull_request:
    branches:
      - main

jobs:
  autogenerate:
    # Skip runs triggered by pre-commit-ci-lite to avoid infinite loops
    if: github.actor != 'pre-commit-ci-lite[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          # Check out the actual PR branch instead of a detached HEAD merge commit.
          # This allows us to push commits back to the branch.
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          submodules: true

      - name: Install uv
        uses: astral-sh/setup-uv@1e862dfacbd1d6d858c55d9b792c756523627244 # v7.1.4

      - name: Create virtual environment
        run: |
          make .venv

      - name: Run generator
        run: |
          source .venv/bin/activate
          devtool gen --all

      - name: Check for changes
        run: |
          if ! git diff --quiet; then
            echo "HAS_CHANGES=true" >> "$GITHUB_ENV"
          else
            echo "HAS_CHANGES=false" >> "$GITHUB_ENV"
          fi

      - name: Check if PR author is Renovate
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [[ "$PR_AUTHOR" == *renovate* || "$PR_AUTHOR" == *red-hat-konflux* ]]; then
            echo "IS_RENOVATE=true" >> "$GITHUB_ENV"
          else
            echo "IS_RENOVATE=false" >> "$GITHUB_ENV"
          fi

      - name: Show changes and fail (non-Renovate)
        if: false
        run: |
          echo "::error::Generated files are out of date"
          echo ""
          echo "Please run locally:"
          echo "  make venv"
          echo "  source .venv/bin/activate"
          echo "  devtool gen --all"
          echo ""
          echo "Changes detected:"
          git diff --color
          exit 1

        # If the author is Renovate, use pre-commit-ci-lite to commit and push the changes.
        # The action pushes commits using the credentials of the pre-commit-ci-lite github app.
        # This avoids the problem where commits pushed from a workflow cannot trigger workflows.
        #
        # Careful, the setup is rather fragile: https://pre-commit.ci/lite.html#setup.
      - uses: pre-commit-ci/lite-action@5d6cc0eb514c891a40562a58a8e71576c5c7fb43 # v1.1.0
        if: always()
        with:
          msg: update generated files
